<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>__TITLE__</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs" type="module"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;background:#020617;color:#e5edf8;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif}button,input,select{font:inherit;color:#e5edf8;background:#111827;border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:11px 13px}button{cursor:pointer}.hero{padding:24px 16px;background:radial-gradient(circle at 20% 0,rgba(56,189,248,.22),transparent 30%),linear-gradient(145deg,#050914,#111827)}.heroBox{padding:24px;border:1px solid rgba(255,255,255,.12);border-radius:28px;background:rgba(15,23,42,.82);box-shadow:0 22px 70px rgba(0,0,0,.38)}h1{font-size:clamp(32px,7vw,68px);line-height:.95;margin:0 0 12px;letter-spacing:-.055em}.lead{color:#9fb0c7;font-size:17px;line-height:1.5}.stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.stat{min-width:110px;padding:13px;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}.stat b{font-size:25px;display:block}.stat span{font-size:12px;color:#9fb0c7}.toolbar{display:flex;gap:10px;flex-wrap:wrap;padding:14px 16px}.toolbar input{flex:1;min-width:210px}.library{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;padding:0 16px 40px}.card{border-radius:22px;background:linear-gradient(180deg,#1f2937,#0f172a);border:1px solid rgba(255,255,255,.12);overflow:hidden}.cover{height:235px;display:flex;align-items:center;justify-content:center;text-align:center;padding:18px;color:#111827;font-weight:900;font-size:20px;background:linear-gradient(135deg,#fde68a,#f59e0b)}.body{padding:14px}.title{font-weight:800;line-height:1.25}.badge{display:inline-flex;margin:9px 4px 0 0;padding:5px 8px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px}.bar{height:7px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;margin:12px 0}.bar i{display:block;height:100%;background:linear-gradient(90deg,#facc15,#f97316)}.actions{display:flex;gap:7px;flex-wrap:wrap}.primary{background:linear-gradient(135deg,#facc15,#f97316);color:#111827;font-weight:850;border:0}.small{font-size:12px;padding:8px 9px}.empty{grid-column:1/-1;text-align:center;color:#9fb0c7;padding:36px}.reader{position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;z-index:999999;background:#000;display:none;overflow:hidden}.reader.open{display:block}body.readerActive{overflow:hidden}.stage{position:absolute;inset:0;overflow:auto;background:#000;overscroll-behavior:contain;touch-action:pan-y}.canvasWrap{min-height:100%;display:flex;align-items:flex-start;justify-content:center}.bookCanvas{display:block;background:#fff;max-width:none;max-height:none;border:0;border-radius:0;box-shadow:none;transition:transform .72s cubic-bezier(.2,.8,.2,1),opacity .72s ease}.bookCanvas.turnNext{transform:translateX(-44px) rotateY(-8deg);opacity:.18}.bookCanvas.turnPrev{transform:translateX(44px) rotateY(8deg);opacity:.18}.topBar,.bottomBar{position:fixed;left:0;right:0;z-index:4;background:rgba(2,6,23,.92);border-color:rgba(255,255,255,.14);transition:transform .28s ease,opacity .28s ease}.topBar{top:0;display:flex;align-items:center;gap:8px;min-height:56px;padding:calc(env(safe-area-inset-top) + 7px) 8px 7px;border-bottom:1px solid rgba(255,255,255,.14)}.bottomBar{bottom:0;display:flex;align-items:center;gap:8px;min-height:52px;padding:7px 8px calc(env(safe-area-inset-bottom) + 7px);border-top:1px solid rgba(255,255,255,.14)}.topBar.hidden{transform:translateY(-110%);opacity:0;pointer-events:none}.bottomBar.hidden{transform:translateY(110%);opacity:0;pointer-events:none}.bookName{flex:1;min-width:0}.bookName b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px}.bookName span{display:block;color:#cbd5e1;font-size:12px}.iconBtn{min-width:46px;min-height:42px}.fullTopBtn{background:#facc15;color:#111827;font-weight:950;border:0;white-space:nowrap;box-shadow:0 8px 22px rgba(250,204,21,.3)}.bigFullBtn{position:fixed;z-index:20;left:50%;top:calc(env(safe-area-inset-top) + 74px);transform:translateX(-50%);background:#facc15;color:#111827;font-weight:950;font-size:18px;border:0;border-radius:999px;padding:14px 24px;box-shadow:0 16px 50px rgba(0,0,0,.55)}.bigFullBtn.hidden{display:none}.bottomBar input{flex:1;min-width:70px}.tapZone{position:fixed;top:68px;bottom:68px;width:26%;z-index:3}.tapLeft{left:0}.tapRight{right:0}.hint{position:fixed;z-index:5;left:50%;bottom:calc(env(safe-area-inset-bottom) + 62px);transform:translateX(-50%);white-space:nowrap;color:#dbeafe;background:rgba(2,6,23,.72);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:7px 10px;font-size:12px;transition:opacity .4s}.zoomBtns{display:flex;gap:5px}.zoomBtns button{min-width:40px}@media(min-width:800px){.library{grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px}.cover{height:315px}.hero{padding:34px 56px}.toolbar{padding:18px 56px}.library{padding:0 56px 56px}.heroBox{padding:34px}}
</style>
</head>
<body>
<section class="hero"><div class="heroBox"><h1>__TITLE__</h1><p class="lead">Додавай PDF у папку <b>books/</b>. Reader відкриває кожну PDF-сторінку як розворот: ліва половина → права половина.</p><div class="stats"><div class="stat"><b id="total">0</b><span>книжок</span></div><div class="stat"><b id="read">0</b><span>прочитано</span></div><div class="stat"><b id="reading">0</b><span>читаю</span></div></div></div></section>
<section class="toolbar"><input id="search" type="search" placeholder="Пошук..."><select id="filter"><option value="all">Усі</option><option value="read">Прочитані</option><option value="reading">Читаю</option><option value="unread">Не прочитані</option></select><button id="exportBtn">Експорт</button><button id="importBtn">Імпорт</button><input id="importFile" type="file" accept="application/json" hidden></section>
<main id="library" class="library"></main>
<div id="reader" class="reader"><div id="stage" class="stage"><div class="canvasWrap"><canvas id="pdfCanvas" class="bookCanvas"></canvas></div></div><div id="topBar" class="topBar"><button id="close" class="iconBtn">←</button><div class="bookName"><b id="rTitle">Книжка</b><span id="pageInfo">Сторінка</span></div><button id="fullBtn" class="fullTopBtn">НА ВЕСЬ ЕКРАН</button><button id="mark" class="primary iconBtn">✓</button></div><button id="bigFullBtn" class="bigFullBtn">НА ВЕСЬ ЕКРАН</button><div id="bottomBar" class="bottomBar"><button id="prev" class="iconBtn">←</button><input id="pageSlider" type="range" min="1" max="1" value="1"><button id="next" class="iconBtn">→</button><div class="zoomBtns"><button id="zoomOut">−</button><button id="zoomIn">+</button></div></div><div id="tapLeft" class="tapZone tapLeft"></div><div id="tapRight" class="tapZone tapRight"></div><div id="hint" class="hint">НА ВЕСЬ ЕКРАН · свайп/тап · центр — панелі</div></div>
<script type="application/json" id="booksData">__BOOKS__</script>
<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs';
const BOOKS=JSON.parse(document.getElementById('booksData').textContent),KEY='pdf-library-progress-final-v1';
let progress=JSON.parse(localStorage.getItem(KEY)||'{}'),currentBook=null,pdfDoc=null,vPage=1,totalVPages=1,rendering=false,zoom=1.0,controlsHidden=false;
const $=s=>document.querySelector(s),lib=$('#library'),reader=$('#reader'),stage=$('#stage'),canvas=$('#pdfCanvas'),ctx=canvas.getContext('2d');
function p(id){return progress[id]||(progress[id]={status:'unread',lastPage:1})}
function save(){localStorage.setItem(KEY,JSON.stringify(progress,null,2));stats()}
function esc(s=''){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function url(s){return encodeURI(s)}
function stats(){$('#total').textContent=BOOKS.length;$('#read').textContent=BOOKS.filter(b=>p(b.id).status==='read').length;$('#reading').textContent=BOOKS.filter(b=>p(b.id).status==='reading').length}
function renderLibrary(){const q=$('#search').value.toLowerCase().trim(),f=$('#filter').value;const items=BOOKS.filter(b=>{const pr=p(b.id),hay=[b.title,b.category,...(b.tags||[])].join(' ').toLowerCase();return hay.includes(q)&&(f==='all'||pr.status===f)});if(!items.length){lib.innerHTML='<div class="empty">PDF не знайдено. Додай файли в папку books/ і зроби push.</div>';return}lib.innerHTML=items.map(b=>{const pr=p(b.id),txt={read:'Прочитано',reading:'Читаю',unread:'Не прочитано'}[pr.status||'unread'],pct=pr.status==='read'?100:Math.min(95,Math.max(4,(pr.lastPage||1)*2));return `<article class="card"><div class="cover">${esc(b.title)}</div><div class="body"><div class="title">${esc(b.title)}</div><span class="badge ${pr.status}">${txt}</span><span class="badge">стор. ${pr.lastPage||1}</span><div class="bar"><i style="width:${pct}%"></i></div><div class="actions"><button class="primary small" data-open="${b.id}">Відкрити</button><button class="small" data-status="reading" data-id="${b.id}">Читаю</button><button class="small" data-status="read" data-id="${b.id}">✓</button></div></div></article>`}).join('');lib.querySelectorAll('[data-open]').forEach(x=>x.onclick=()=>openBook(x.dataset.open));lib.querySelectorAll('[data-status]').forEach(x=>x.onclick=()=>{p(x.dataset.id).status=x.dataset.status;save();renderLibrary()})}
async function enterFullScreen(){reader.classList.add('open');document.body.classList.add('readerActive');$('#bigFullBtn').classList.add('hidden');try{if(!document.fullscreenElement)await reader.requestFullscreen()}catch(e){try{await document.documentElement.requestFullscreen()}catch(_){}}try{if(screen.orientation&&screen.orientation.lock)await screen.orientation.lock('landscape')}catch(e){}setTimeout(()=>show(vPage,0),120)}
async function openBook(id){currentBook=BOOKS.find(b=>b.id===id);if(!currentBook)return;reader.classList.add('open');document.body.classList.add('readerActive');$('#bigFullBtn').classList.remove('hidden');$('#rTitle').textContent=currentBook.title;const pr=p(id);vPage=pr.lastPage||1;if(pr.status==='unread')pr.status='reading';save();pdfDoc=await pdfjsLib.getDocument(url(currentBook.file)).promise;totalVPages=pdfDoc.numPages*2;vPage=Math.min(Math.max(1,vPage),totalVPages);$('#pageSlider').max=totalVPages;await show(vPage,0)}
function getPdfPage(v){return Math.floor((v-1)/2)+1}
function getSide(v){return v%2===1?'left':'right'}
async function show(num,dir=1){if(!pdfDoc||rendering)return;rendering=true;canvas.classList.remove('turnNext','turnPrev');if(dir>0)canvas.classList.add('turnNext');if(dir<0)canvas.classList.add('turnPrev');await new Promise(r=>setTimeout(r,220));const page=await pdfDoc.getPage(getPdfPage(num));const base=page.getViewport({scale:1});const side=getSide(num);let clip,logicalW=base.width/2,logicalH=base.height;if(side==='left')clip=[0,0,base.width/2,base.height];else clip=[base.width/2,0,base.width,base.height];const cssW=Math.max(1,stage.clientWidth)*zoom;const fit=cssW/logicalW;const dpr=Math.min(devicePixelRatio||1,3);const renderBoost=1.9;const scale=fit*dpr*renderBoost;const viewport=page.getViewport({scale});const cssH=logicalH*fit;canvas.width=Math.floor(logicalW*scale);canvas.height=Math.floor(logicalH*scale);canvas.style.width=Math.floor(cssW)+'px';canvas.style.height=Math.floor(cssH)+'px';ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();ctx.translate(-clip[0]*scale,-clip[1]*scale);await page.render({canvasContext:ctx,viewport}).promise;ctx.restore();canvas.classList.remove('turnNext','turnPrev');stage.scrollTop=0;$('#pageInfo').textContent=`Розворот ${getPdfPage(num)} · ${side==='left'?'ліва':'права'} половина · ${num}/${totalVPages} · zoom ${Math.round(zoom*100)}%`;$('#pageSlider').value=num;p(currentBook.id).lastPage=num;save();rendering=false}
function nextPage(){if(pdfDoc&&vPage<totalVPages)show(++vPage,1)}function prevPage(){if(vPage>1)show(--vPage,-1)}function toggleControls(){controlsHidden=!controlsHidden;$('#topBar').classList.toggle('hidden',controlsHidden);$('#bottomBar').classList.toggle('hidden',controlsHidden)}
$('#fullBtn').onclick=enterFullScreen;$('#bigFullBtn').onclick=enterFullScreen;$('#prev').onclick=prevPage;$('#next').onclick=nextPage;$('#tapLeft').onclick=prevPage;$('#tapRight').onclick=nextPage;stage.onclick=e=>{if(e.target.id==='stage'||e.target.className==='canvasWrap')toggleControls()};$('#pageSlider').oninput=e=>{const old=vPage;vPage=parseInt(e.target.value,10);show(vPage,vPage>old?1:-1)};$('#zoomIn').onclick=()=>{zoom=Math.min(2.4,zoom+.15);show(vPage,0)};$('#zoomOut').onclick=()=>{zoom=Math.max(.85,zoom-.15);show(vPage,0)};$('#mark').onclick=()=>{if(!currentBook)return;p(currentBook.id).status='read';save();renderLibrary();alert('Позначено як прочитано')};$('#close').onclick=async()=>{reader.classList.remove('open');document.body.classList.remove('readerActive');pdfDoc=null;try{if(document.fullscreenElement)await document.exitFullscreen()}catch(e){}try{if(screen.orientation&&screen.orientation.unlock)screen.orientation.unlock()}catch(e){}renderLibrary()};
let sx=0,sy=0,st=0;stage.addEventListener('touchstart',e=>{const t=e.changedTouches[0];sx=t.clientX;sy=t.clientY;st=Date.now()},{passive:true});stage.addEventListener('touchend',e=>{const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.35&&Date.now()-st<900){dx<0?nextPage():prevPage()}},{passive:true});addEventListener('resize',()=>{if(pdfDoc)show(vPage,0)});addEventListener('keydown',e=>{if(!reader.classList.contains('open'))return;if(e.key==='ArrowLeft')prevPage();if(e.key==='ArrowRight')nextPage();if(e.key==='Escape')$('#close').click();if(e.key==='f')enterFullScreen()});$('#search').oninput=renderLibrary;$('#filter').onchange=renderLibrary;$('#exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify(progress,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='progress.json';a.click();URL.revokeObjectURL(a.href)};$('#importBtn').onclick=()=>$('#importFile').click();$('#importFile').onchange=async e=>{const f=e.target.files[0];if(!f)return;progress=JSON.parse(await f.text());save();renderLibrary()};stats();renderLibrary();
</script></body></html>
